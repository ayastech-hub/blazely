version: "3.8"
services:
  postgres:
    image: postgres:15
    container_name: base_launchpad_db
    environment:
      POSTGRES_DB: base_launchpad
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - ./backend/db_data:/var/lib/postgresql/data
